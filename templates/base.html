<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Учебный портал{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <a class="logo" href="{{ url_for('index') }}">Учебный портал</a>
            <nav>
                <a href="{{ url_for('directions.list_items') }}">Направления</a>
                {# <a href="{{ url_for('teachers.list_items') }}">Преподаватели</a> #}
                {# <a href="{{ url_for('students.list_items') }}">Студенты</a> #}
                {# <a href="{{ url_for('courses.list_items') }}">Курсы</a> #}
                {# <a href="{{ url_for('results.list_items') }}">Оценки</a> #}
            </nav>
        </div>
    </header>
    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
