{% extends "base.html" %}

{% block title %}{% if item %}Редактирование{% else %}Новая{% endif %} оценка{% endblock %}

{% block content %}
<div class="card">
    <h1>{% if item %}Редактировать оценку{% else %}Добавить оценку{% endif %}</h1>
    <form method="post">
        <label for="student_id">Студент</label>
        <select id="student_id" name="student_id" required>
            <option value="">— выберите —</option>
            {% for student in students %}
            <option value="{{ student.id }}"
                {% if item and item.student_id == student.id %}selected{% endif %}>
                [{{ student.id }}] {{ student.first_name }} {{ student.last_name }}
            </option>
            {% endfor %}
        </select>

        <label for="course_id">Курс</label>
        <select id="course_id" name="course_id" required>
            <option value="">— выберите —</option>
            {% for course in courses %}
            <option value="{{ course.id }}"
                {% if item and item.course_id == course.id %}selected{% endif %}>
                [{{ course.id }}] {{ course.name }}
            </option>
            {% endfor %}
        </select>

        <label for="grade">Оценка (1–5)</label>
        <input id="grade" name="grade" type="number" min="1" max="5" step="0.1"
            value="{{ item.grade if item else '' }}" required>

        <label for="exam_date">Дата экзамена</label>
        <input id="exam_date" name="exam_date" type="date"
            value="{{ item.exam_date.isoformat() if item and item.exam_date else '' }}">

        <div class="form-actions">
            <button class="btn" type="submit">Сохранить</button>
            <a class="btn btn-secondary" href="{{ url_for('results.list_items') }}">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
